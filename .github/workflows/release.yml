name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install

      - run: pnpm run lint

      - run: pnpm run dev:prepare

      - run: pnpm run test

      - run: pnpm run prepack

      - name: Determine npm tag
        id: npm-tag
        run: |
          if git branch -r --contains ${{ github.ref }} | grep -q 'origin/next'; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public --tag ${{ steps.npm-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "${{ github.ref_name }}" | head -1)
          if [ -n "$PREV_TAG" ]; then
            npx changelogen --from "$PREV_TAG" --to "${{ github.ref_name }}" --output CHANGELOG.md
          else
            npx changelogen --output CHANGELOG.md
          fi

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update changelog for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} --notes-file CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
