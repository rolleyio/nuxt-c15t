name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub Release
  id-token: write   # npm provenance + Trusted Publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint
      - run: pnpm run dev:prepare
      - run: pnpm run test
      - run: pnpm run prepack

      # Publish from inside CI using the tag as the source of truth for the
      # version. Local `pnpm release` already wrote CHANGELOG.md, bumped
      # package.json, committed, and tagged — we just publish what's tagged.
      - name: Determine npm dist-tag
        id: npm-tag
        run: |
          case "${{ github.ref_name }}" in
            *-beta.*|*-alpha.*|*-rc.*) echo "tag=next" >> "$GITHUB_OUTPUT" ;;
            *) echo "tag=latest" >> "$GITHUB_OUTPUT" ;;
          esac

      # Use npm (not pnpm) to publish — pnpm's OIDC support is incomplete
      # (see pnpm/pnpm#9812). Auth is via npm Trusted Publishing: the
      # OIDC token is provided by `id-token: write` above, and the
      # rolleyio/nuxt-c15t repo + this workflow are registered as a
      # Trusted Publisher on npmjs.com.
      - name: Publish to npm
        run: npm publish --provenance --access public --tag ${{ steps.npm-tag.outputs.tag }}

      - name: Create GitHub Release
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
